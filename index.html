<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Dashboard</title>
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="styles.css?v=crk102">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i data-lucide="trophy" class="icon-primary"></i>
                <div class="logo-text">CRICKET<span>LIVE</span></div>
            </div>
            <div class="clock-section">
                <div id="clock">00:00:00</div>
                <div id="date">Thursday, April 16, 2026</div>
            </div>
        </header>

        <!-- Main Scoreboard -->
        <main class="main-content">
            <div class="section-label">LIVE MATCH</div>
            <div id="live-match-container" class="live-match-card">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Fetching Live Scores...</p>
                </div>
            </div>
        </main>

        <!-- Other Matches Section -->
        <section class="sidebar">
            <div class="section-label">OTHER MATCHES</div>
            <div id="matches-list" class="matches-list">
                <!-- Matches will be populated here -->
            </div>
        </section>

        <!-- Footer / Ticker -->
        <footer class="footer">
            <div class="ticker-label">NEWS TICKER</div>
            <div class="ticker-wrapper">
                <div id="ticker" class="ticker">
                    Welcome to Skoop Cricket Live. Stay tuned for live updates from around the world!
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js?v=crk102"></script>
</body>
</html>
